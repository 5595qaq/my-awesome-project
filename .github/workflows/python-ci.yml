name: Python 自動化測試 (Pytest CI)

# 觸發條件：當有人 push 到 main 分支，或發起針對 main 的 Pull Request 時
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-logic:
    # 使用 GitHub 提供的最新版 Ubuntu 虛擬伺服器
    runs-on: ubuntu-latest

    steps:
    # 1. 取得專案原始碼
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. 安裝 Python 環境 (建議指定你開發用的版本，例如 3.10)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. 安裝必要套件 (pytest, fastapi, sqlalchemy 等)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest httpx pytest-asyncio fastapi uvicorn sqlalchemy psycopg2-binary websockets

    # 4. 準備與執行 PostgreSQL (Test DB)
    - name: Start PostgreSQL container
      run: |
        docker run --name test-postgres -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=vlm_eval_test -p 5432:5432 -d postgres:15
        # 簡單等待 DB 啟動
        sleep 5

    # 5. 執行測試！
    - name: Run Pytest
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vlm_eval_test
      run: |
        # 到後端目錄並執行 pytest
        pytest backend/tests/ -v
